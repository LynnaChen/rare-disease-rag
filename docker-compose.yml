services:
  rare-disease-rag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rare-disease-rag
    env_file:
      - .env
    environment:
      VLLM_API_BASE: ${VLLM_API_BASE:-http://vllm:8000/v1}
      VLLM_MODEL_NAME: ${VLLM_MODEL_NAME:-my-local-model}
      DB_PATH: ${DB_PATH:-/data/chroma_db_med}
      INPUT_DIR: ${INPUT_DIR:-/data/input}
      MODEL_CACHE_DIR: ${MODEL_CACHE_DIR:-/data/model_cache}
      EMBED_MODEL_PATH: ${EMBED_MODEL_PATH:-BAAI/bge-m3}
      COLLECTION_NAME: ${COLLECTION_NAME:-med_rare_diseases}
    volumes:
      - ./model_cache:/data/model_cache 
    depends_on:
      - vllm
    restart: unless-stopped

  vllm:
    image: vllm/vllm-openai:latest
    container_name: rare-rag-vllm
    env_file:
      - .env
    command: >
      --model ${VLLM_HF_MODEL:-Qwen/Qwen2-7B-Instruct}
      --served-model-name ${VLLM_MODEL_NAME:-my-local-model}
      --host 0.0.0.0
      --port 8000
      --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION:-0.9}
      --max-model-len ${VLLM_MAX_MODEL_LEN:-32768}
    ports:
      - "8000:8000"
    volumes:
      - ./model_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0'] 
              capabilities: [gpu]
    restart: unless-stopped
